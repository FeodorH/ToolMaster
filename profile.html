<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль пользователя | ToolMaster</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-tools me-2"></i>ToolMaster
            </a>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h2 class="mb-4">Профиль пользователя</h2>
                        
                        <div id="profile-content">
                            <div class="text-center py-5">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Загрузка...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Загрузка данных профиля
        async function loadProfile() {
            const userId = getCookie('user_id');
            if (!userId) {
                window.location.href = 'index.html';
                return;
            }
            
            try {
                const response = await fetch(`/api/users/${userId}`);
                const user = await response.json();
                
                if (response.ok) {
                    displayProfile(user);
                } else {
                    showError('Не удалось загрузить профиль');
                }
            } catch (error) {
                showError('Ошибка соединения');
            }
        }
        
        function displayProfile(user) {
            const container = document.getElementById('profile-content');
            container.innerHTML = `
                <div class="alert alert-info">
                    <i class="fas fa-info-circle me-2"></i>
                    Ваш логин: <strong>${user.login}</strong>
                </div>
                
                <form id="profileForm">
                    <div class="mb-3">
                        <label class="form-label">Имя</label>
                        <input type="text" class="form-control" name="name" value="${user.name || ''}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Телефон</label>
                        <input type="tel" class="form-control" name="phone" value="${user.phone || ''}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" value="${user.email || ''}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Сообщение</label>
                        <textarea class="form-control" name="message" rows="4">${user.message || ''}</textarea>
                    </div>
                    
                    <div id="form-message" class="form-message mb-3" style="display: none;"></div>
                    
                    <button type="submit" class="btn btn-primary">
                        <span class="btn-text">Сохранить изменения</span>
                        <span class="btn-loader" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i> Сохранение...
                        </span>
                    </button>
                </form>
            `;
            
            // Добавляем обработчик формы
            document.getElementById('profileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData);
                
                try {
                    const response = await fetch(`/api/users/${userId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok) {
                        showMessage('success', 'Профиль успешно обновлен!');
                    } else {
                        showMessage('error', result.error || 'Ошибка обновления');
                    }
                } catch (error) {
                    showMessage('error', 'Ошибка соединения');
                }
            });
        }
        
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }
        
        function showError(message) {
            document.getElementById('profile-content').innerHTML = `
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    ${message}
                </div>
                <a href="index.html" class="btn btn-primary">Вернуться на главную</a>
            `;
        }
        
        function showMessage(type, text) {
            const msgDiv = document.getElementById('form-message');
            msgDiv.className = `alert alert-${type === 'success' ? 'success' : 'danger'}`;
            msgDiv.textContent = text;
            msgDiv.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => msgDiv.style.display = 'none', 3000);
            }
        }
        
        loadProfile();
    </script>
</body>
</html>
